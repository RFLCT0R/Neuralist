<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Jabarai</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="split-page">
        <div class="split-left">
            <a href="index.html" class="auth-logo">Jabarai<span>.</span></a>

            <h1 class="auth-title">Login to your account</h1>

            <div class="social-buttons">
                <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
                <button class="social-btn github"><i class="fab fa-github"></i> GitHub</button>
            </div>

            <form class="auth-form">
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="btn-wrap">
                    <button type="submit" class="auth-button">Log in</button>
                </div>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
        <div class="split-right">
            <div class="right-image">
                <img src="assets/images/sign_up_in2.png" alt="Jabarai illustration">
            </div>
            <h2 class="right-title">Log in to your workspace</h2>
            <p class="right-text">Enter your email and password to access your Jabarai account. You're one step closer to discovering the best AI tools library</p>
            <a href="index.html" class="right-link">See your favorites</a>
        </div>
    </div>
</body>
</html>
