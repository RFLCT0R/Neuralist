<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Jabarai</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', Arial, sans-serif; }
        html, body {
            width: 100%;
            height: 100%;
        }
        .split-page {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }
        .split-left {
            width: 60%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .split-right {
            width: 40%;
            background: #f2f3f8;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 40px;
        }
        .auth-logo {
            font-size: 36px;
            font-weight: 900;
            color: #1a1a1a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            margin-bottom: 24px;
        }
        .auth-logo span:last-child {
            color: #0ea5e9;
        }
        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 24px;
        }
        .social-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 24px;
        }
        .social-btn {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            color: #374151;
        }
        .social-btn:hover {
            background: #f9fafb;
        }
        .social-btn.google {
            background: #ffffff;
            color: #ea4335;
            border-color: #ea4335;
        }
        .social-btn.google:hover {
            background: #fef2f2;
        }
        .social-btn.github {
            background: #ffffff;
            color: #24292e;
            border-color: #24292e;
        }
        .social-btn.github:hover {
            background: #f3f4f6;
        }
        .auth-form {
            width: 100%;
            max-width: 420px;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 14px;
        }
        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
            color: #374151;
        }
        .input-wrap input:focus {
            outline: none;
            border-color: #9ca3af;
        }
        .input-wrap input::placeholder {
            color: #9ca3af;
        }
        .btn-wrap {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }
        .auth-button {
            padding: 12px 48px;
            background: #0ea5e9;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-button:hover {
            background: #0284c7;
        }
        .auth-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
        }
        .auth-footer a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        /* Right side */
        .right-title {
            font-size: 27px;
            font-weight: 600;
            color: #33333b;
            margin-bottom: 16px;
            text-align: left;
            max-width: 400px;
            line-height: 1.3;
        }
        .right-text {
            font-size: 15px;
            color: #33333b;
            line-height: 1.6;
            text-align: left;
            max-width: 400px;
            margin-bottom: 24px;
        }
        .right-link {
            font-size: 14px;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .right-image {
            width: 100%;
            max-width: 320px;
            margin-bottom: 38px;
            align-self: center;
            transform: translateX(-40px);
        }
        .right-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="split-page">
        <div class="split-left">
            <a href="index.html" class="auth-logo">Jabarai<span>.</span></a>

            <h1 class="auth-title">Login to your account</h1>

            <div class="social-buttons">
                <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
                <button class="social-btn github"><i class="fab fa-github"></i> GitHub</button>
            </div>

            <form class="auth-form" id="login-form">
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="btn-wrap">
                    <button type="submit" class="auth-button" id="submit-btn">Log in</button>
                </div>
                <div class="error-message" id="error-msg"></div>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>

    <script src="assets/js/config.js"></script>
    <script>
        // Initialize Supabase client
        const supabase = window.supabase.createClient(
            SUPABASE_CONFIG.url,
            SUPABASE_CONFIG.anonKey
        );

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Reset error message
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    throw error;
                }
                
                // Store session in localStorage
                if (data.session) {
                    localStorage.setItem('supabase_session', JSON.stringify(data.session));
                }
                
                // Redirect to home page after successful login
                window.location.href = 'index.html';
                
            } catch (error) {
                errorMsg.textContent = error.message || 'Invalid email or password. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log in';
            }
        });

        // Social login handlers
        document.querySelector('.social-btn.google').addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google'
                });
                if (error) throw error;
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });

        document.querySelector('.social-btn.github').addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'github'
                });
                if (error) throw error;
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        });
    </script>
        <div class="split-right">
            <div class="right-image">
                <img src="assets/images/sign_up_in2.png" alt="Jabarai illustration" loading="lazy">
            </div>
            <h2 class="right-title">Log in to your workspace</h2>
            <p class="right-text">Enter your email and password to access your Jabarai account. You're one step closer to discovering the best AI tools library</p>
            <a href="index.html" class="right-link">See your favorites</a>
        </div>
    </div>
</body>
</html>
