<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool | Jabarai</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/footer-components.css">
    <link rel="stylesheet" href="assets/css/tool.css">
</head>
<body>
    <header class="toolbar">
        <a href="index.html" class="logo">
            <span style="color: #1a1a1a;">Jabarai</span><span style="color: #0ea5e9;">.</span>
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-actions">
            <a href="register.html" class="btn-signup">Get Started</a>
        </div>
    </header>

    <main class="tool-hero" id="main-content">
        <div class="tool-container">
            <div class="tool-loading"><div class="tool-spinner"></div></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-main">
                <div class="footer-brand">
                    <a href="index.html" class="footer-logo">
                        <span style="color: #ffffff;">Jabarai</span><span style="color: #0ea5e9;">.</span>
                    </a>
                    <p class="footer-tagline">Discover the best AI tools, all in one place.</p>
                </div>
                <div class="footer-column">
                    <h4>Explore</h4>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="index2.html">Welcome</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h4>Company</h4>
                    <ul>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                    </ul>
                </div>
                <div class="footer-column">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="privacy-policy.html">Privacy Policy</a></li>
                        <li><a href="terms-of-use.html">Terms of Use</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p class="footer-copyright">© 2026 Jabarai. All rights reserved.</p>
                <div class="footer-bottom-social">
                    <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        function fmt(n) {
            if (!n) return '0';
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n.toString();
        }

        async function loadTool() {
            const id = new URLSearchParams(location.search).get('id');
            if (!id) {
                document.querySelector('.tool-container').innerHTML = '<p style="text-align:center;color:#888;">No tool selected.</p>';
                return;
            }
            try {
                const [tools1, tools2, tools3] = await Promise.all([
                    fetch('assets/data/tools1.json').then(r => r.json()),
                    fetch('assets/data/tools2.json').then(r => r.json()),
                    fetch('assets/data/tools3.json').then(r => r.json())
                ]);
                const tools = [...tools1, ...tools2, ...tools3];
                const tool = tools.find(t => t.id === id || t.slug === id);
                if (!tool) {
                    document.querySelector('.tool-container').innerHTML = '<p style="text-align:center;color:#888;">Tool not found.</p>';
                    return;
                }

                const c = tool.categories || {};
                const pr = tool.pricingDetails || [];
                const feat = tool.features || [];
                const alts = tool.alternatives || [];
                const faq = tool.faq || [];
                const soc = tool.socialLinks || {};
                const pros = tool.pros || [];
                const cons = tool.cons || [];

                document.querySelector('.tool-container').innerHTML = `
                    <div class="tool-header">
                        <img src="${tool.logo}" alt="${tool.name}" class="tool-logo" onerror="this.src='assets/images/logo.png'">
                        <div class="tool-header-info">
                            <h1 class="tool-name">${tool.name}</h1>
                            <div class="tool-company">by ${tool.company}</div>
                            <div class="tool-header-meta">
                                <span class="star"><i class="fas fa-star"></i> <strong>${tool.rating || '—'}</strong></span> <span style="color:#888;">(${fmt(tool.totalReviews)} reviews)</span> &nbsp;|&nbsp; <span style="color:#888;">Pricing:</span> <strong>${c.pricing?.[0] || '—'}</strong> &nbsp;|&nbsp; <span style="color:#888;">Released:</span> <strong>${tool.releaseDate ? new Date(tool.releaseDate).getFullYear() : '—'}</strong> ${tool.releaseDate ? new Date(tool.releaseDate).toLocaleDateString('en-US',{month:'short', day:'numeric'}) : ''}
                            </div>
                            <div class="tool-tags" style="margin-top: 12px; margin-bottom: 0;">
                                ${c.function?.slice(0,4).map(f => `<span class="tool-tag">${f}</span>`).join('') || ''}
                                ${tool.hasFreeTier ? '<span class="tool-tag">Free Tier</span>' : ''}
                                ${!tool.hasFreeTier && tool.hasFreeTrial ? '<span class="tool-tag">Free Trial</span>' : ''}
                                ${tool.apiAvailable ? '<span class="tool-tag">API</span>' : ''}
                            </div>
                        </div>
                        <div class="tool-actions">
                            <a href="${tool.websiteUrl}" target="_blank" class="tool-visit">
                                <i class="fas fa-external-link-alt"></i> Visit
                            </a>
                            <a href="javascript:history.back()" class="tool-back-btn">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                        </div>
                    </div>

                    ${tool.whatMakesItSpecial ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">What Makes It Special</h2>
                        <p>${tool.whatMakesItSpecial}</p>
                    </div>` : ''}

                    ${tool.bestFor ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Best For</h2>
                        <p>${tool.bestFor}</p>
                    </div>` : ''}

                    <div class="tool-section">
                        <h2 class="tool-section-title">About</h2>
                        <p>${tool.longDescription || tool.shortDescription}</p>
                    </div>

                    ${(feat.length || c.platform?.length) ? `
                    <div class="tool-features-platforms">
                        ${feat.length ? `
                        <div class="tool-section">
                            <h2 class="tool-section-title">Features</h2>
                            <ul>${feat.map(f => `<li>${f}</li>`).join('')}</ul>
                        </div>` : ''}
                        ${c.platform?.length ? `
                        <div class="tool-section">
                            <h2 class="tool-section-title">Platforms</h2>
                            <div class="tool-platforms">
                                ${c.platform.map(p => {
                                    const icons = {'Web':'fa-globe','iOS':'fa-apple','Android':'fa-android','Mac':'fa-apple','Windows':'fa-windows','API':'fa-code','WhatsApp':'fa-whatsapp','Facebook':'fa-facebook','Instagram':'fa-instagram','Messenger':'fa-comment','Ray-Ban Meta Smart Glasses':'fa-glasses','PowerPoint Add-in':'fa-file-powerpoint','WPS':'fa-file-word','Self-hosted':'fa-server','Browser Extension':'fa-puzzle-piece','Excel Add-in':'fa-file-excel','Google Sheets Add-on':'fa-table','Google Slides':'fa-file-powerpoint','Web (Google Slides)':'fa-file-powerpoint','Desktop':'fa-desktop','Mobile':'fa-mobile-screen'};
                                    const brands = new Set(['fa-apple','fa-android','fa-windows','fa-whatsapp','fa-facebook','fa-instagram']);
                                    const icon = icons[p] || 'fa-desktop';
                                    const prefix = brands.has(icon) ? 'fab' : 'fas';
                                    return `<div class="tool-platform"><i class="${prefix} ${icon}"></i> ${p}</div>`;
                                }).join('')}
                            </div>
                        </div>` : ''}
                    </div>` : ''}

                    ${tool.limitations?.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Limitations</h2>
                        <ul>${tool.limitations.map(l => `<li>${l}</li>`).join('')}</ul>
                    </div>` : ''}

                    ${(pros.length || cons.length) ? `
                    <div class="tool-procon">
                        <div class="pros">
                            <h3>Pros</h3>
                            <ul>${pros.map(p => `<li>${p}</li>`).join('')}</ul>
                        </div>
                        <div class="cons">
                            <h3>Cons</h3>
                            <ul>${cons.map(c => `<li>${c}</li>`).join('')}</ul>
                        </div>
                    </div>` : ''}

                    ${pr.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Pricing</h2>
                        <div class="tool-pricing">
                            ${pr.map(p => `
                            <div class="tool-price-card">
                                <h4>${p.plan}</h4>
                                <div class="price-row">
                                    <span class="amount">${p.price}</span>
                                    <span class="cycle">${p.billingCycle}</span>
                                </div>
                                <div class="features">${p.features?.slice(0,3).map(f => `<div class="pf"><i class="fas fa-check"></i> ${f}</div>`).join('') || ''}</div>
                            </div>`).join('')}
                        </div>
                    </div>` : ''}

                    ${tool.integrations?.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Integrations</h2>
                        <div class="tool-tags">
                            ${tool.integrations.map(i => `<span class="tool-tag">${i}</span>`).join('')}
                        </div>
                    </div>` : ''}

                    ${c.useCase?.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Use Cases</h2>
                        <div class="tool-tags">
                            ${c.useCase.map(u => `<span class="tool-tag">${u}</span>`).join('')}
                        </div>
                    </div>` : ''}

                    ${tool.videoUrl ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Video</h2>
                        <div class="tool-video">
                            <iframe src="${tool.videoUrl.replace('watch?v=','embed/')}" allowfullscreen></iframe>
                        </div>
                    </div>` : ''}

                    ${faq.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">FAQ</h2>
                        ${faq.map((f,i) => `
                        <div class="tool-faq-item ${i===0?'active':''}">
                            <button class="tool-faq-q" onclick="this.parentElement.classList.toggle('active')">
                                ${f.question} <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="tool-faq-a"><p>${f.answer}</p></div>
                        </div>`).join('')}
                    </div>` : ''}

                    ${Object.keys(soc).length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Connect</h2>
                        <div class="tool-socials">
                            ${soc.twitter ? `<a href="${soc.twitter}" target="_blank" class="tool-social"><i class="fab fa-twitter"></i> Twitter</a>` : ''}
                            ${soc.linkedin ? `<a href="${soc.linkedin}" target="_blank" class="tool-social"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
                            ${soc.youtube ? `<a href="${soc.youtube}" target="_blank" class="tool-social"><i class="fab fa-youtube"></i> YouTube</a>` : ''}
                            ${soc.instagram ? `<a href="${soc.instagram}" target="_blank" class="tool-social"><i class="fab fa-instagram"></i> Instagram</a>` : ''}
                            ${soc.github ? `<a href="${soc.github}" target="_blank" class="tool-social"><i class="fab fa-github"></i> GitHub</a>` : ''}
                        </div>
                    </div>` : ''}

                    ${alts.length ? `
                    <div class="tool-section">
                        <h2 class="tool-section-title">Alternatives</h2>
                        <div class="tool-alts">
                            ${alts.map(a => `
                            <a href="tool.html?id=${a.slug}" class="tool-alt">
                                <img src="${tools.find(t => t.slug === a.slug)?.logo || 'assets/images/logo.png'}" alt="${a.name}">
                                <div>
                                    <h4>${a.name}</h4>
                                    <p>${a.why || 'Alternative'}</p>
                                </div>
                            </a>`).join('')}
                        </div>
                    </div>` : ''}

                    <div class="tool-cta">
                        <h2>Try ${tool.name}</h2>
                        <p>${tool.shortDescription || 'Start using this tool today.'}</p>
                        <a href="${tool.websiteUrl}" target="_blank"><i class="fas fa-rocket"></i> Get Started</a>
                    </div>
                `;
                document.title = `${tool.name} - Jabarai`;
            } catch(e) {
                console.error(e);
                document.querySelector('.tool-container').innerHTML = '<p style="text-align:center;color:#888;">Error loading tool.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadTool);
    </script>
</body>
</html>
